const BGM=(()=>{
  let _audios=null,_melIdx=0,playing=false,ctx=null,master=null,tid=null;

  // ── 3가지 BGM 멜로디 ──
  const MEL1=[
    [523,0.22],[659,0.22],[784,0.22],[880,0.44],
    [784,0.22],[659,0.22],[587,0.22],[659,0.44],
    [523,0.22],[659,0.22],[784,0.22],[1047,0.44],
    [880,0.22],[784,0.22],[659,0.66],[523,0.66],
    [659,0.22],[784,0.22],[880,0.22],[784,0.22],
    [659,0.22],[523,0.22],[587,0.22],[659,0.44],
    [784,0.22],[659,0.22],[523,0.88],
  ];
  const MEL2=[
    [659,0.22],[784,0.22],[880,0.22],[988,0.44],
    [880,0.22],[784,0.22],[698,0.22],[784,0.44],
    [659,0.22],[784,0.22],[880,0.22],[1047,0.44],
    [988,0.22],[880,0.22],[784,0.66],[659,0.66],
    [784,0.22],[880,0.22],[988,0.22],[880,0.22],
    [784,0.22],[659,0.22],[698,0.22],[784,0.44],
    [880,0.22],[784,0.22],[659,0.88],
  ];
  const MEL3=[
    [523,0.33],[659,0.33],[784,0.33],
    [659,0.33],[523,0.33],[440,0.33],
    [523,0.33],[659,0.33],[784,0.33],
    [880,0.66],[784,0.33],
    [659,0.33],[523,0.33],[440,0.33],
    [523,0.66],[440,0.33],
    [392,0.33],[440,0.33],[523,0.33],
    [659,0.66],[523,0.33],
    [440,0.33],[523,0.33],[659,0.33],
    [784,0.66],[659,0.33],
    [523,0.33],[440,0.33],[523,0.88],
  ];
  const MELS=[MEL1,MEL2,MEL3];

  const makeBgmUrl=(mel)=>{
    const sr=22050,totalSec=8,len=Math.floor(sr*totalSec);
    const samples=new Int16Array(len);
    let pos=0;
    const addNote=(freq,dur)=>{
      const n=Math.floor(sr*dur);
      for(let i=0;i<n&&pos+i<len;i++){
        const t=i/sr;
        const env=Math.min(1,i/(sr*0.025))*Math.min(1,(n-i)/(sr*0.08));
        const v=Math.sin(2*Math.PI*freq*t)*0.24*env;
        samples[pos+i]=Math.max(-32767,Math.min(32767,Math.floor(v*32767)));
      }
      pos+=n;
    };
    while(pos<len){mel.forEach(([f,d])=>addNote(f,d));}
    const dataBytes=samples.length*2;
    const buffer=new ArrayBuffer(44+dataBytes);
    const view=new DataView(buffer);
    const write=(off,str)=>{for(let i=0;i<str.length;i++)view.setUint8(off+i,str.charCodeAt(i));};
    write(0,'RIFF');view.setUint32(4,36+dataBytes,true);write(8,'WAVE');
    write(12,'fmt ');view.setUint32(16,16,true);view.setUint16(20,1,true);
    view.setUint16(22,1,true);view.setUint32(24,sr,true);view.setUint32(28,sr*2,true);
    view.setUint16(32,2,true);view.setUint16(34,16,true);
    write(36,'data');view.setUint32(40,dataBytes,true);
    let off=44;for(let i=0;i<samples.length;i++,off+=2)view.setInt16(off,samples[i],true);
    let binary='';const bytes=new Uint8Array(buffer);const chunk=0x8000;
    for(let i=0;i<bytes.length;i+=chunk)binary+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));
    return 'data:audio/wav;base64,'+btoa(binary);
  };

  const ensureAudios=()=>{
    if(_audios)return _audios;
    _audios=MELS.map((mel,idx)=>{
      const a=new Audio(makeBgmUrl(mel));
      a.volume=0.42;a.preload='auto';
      a.setAttribute('playsinline','');a.setAttribute('webkit-playsinline','');
      a.onended=()=>{
        if(!playing)return;
        _melIdx=(_melIdx+1)%MELS.length;
        _audios[_melIdx].currentTime=0;
        _audios[_melIdx].play().catch(()=>loopWebAudio());
      };
      return a;
    });
    return _audios;
  };

  const ensureCtx=()=>{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return null;
    if(!ctx||ctx.state==='closed'){ctx=new AC();master=ctx.createGain();master.gain.value=0.22;master.connect(ctx.destination);}
    return ctx;
  };
  const note=(f,d,t)=>{
    if(!ctx||!master)return;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(master);o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.0,t);g.gain.linearRampToValueAtTime(0.24,t+0.02);
    g.gain.setTargetAtTime(0.0,t+d*0.65,0.07);o.start(t);o.stop(t+d+0.1);
  };
  const loopWebAudio=async()=>{
    if(!playing)return;
    ensureCtx();if(!ctx)return;
    try{if(ctx.state==='suspended')await ctx.resume();}catch(e){}
    if(ctx.state!=='running')return;
    const mel=MELS[_melIdx];
    let t=ctx.currentTime+0.05;
    mel.forEach(([f,d])=>{note(f,d,t);t+=d;});
    clearTimeout(tid);
    tid=setTimeout(()=>{
      _melIdx=(_melIdx+1)%MELS.length;
      loopWebAudio();
    },Math.max(200,(t-ctx.currentTime-0.04)*1000));
  };

  return{
    async unlock(){
      try{const a=ensureAudios()[0];a.load();}catch(e){}
      try{ensureCtx();if(ctx&&ctx.state==='suspended')await ctx.resume();}catch(e){}
    },
    async start(){
      playing=true;_melIdx=0;clearTimeout(tid);
      const audios=ensureAudios();
      try{audios[0].currentTime=0;await audios[0].play();return true;}
      catch(e){loopWebAudio();return false;}
    },
    stop(){
      playing=false;clearTimeout(tid);
      if(_audios)_audios.forEach(a=>{try{a.pause();a.currentTime=0;}catch(e){}});
      if(master&&ctx){
        master.gain.cancelScheduledValues(ctx.currentTime);
        master.gain.setTargetAtTime(0,ctx.currentTime,0.18);
        setTimeout(()=>{if(master&&!playing)master.gain.value=0.22;},350);
      }
    },
    async toggle(on){return on?await this.start():(this.stop(),true);},
  };
})();

const unlockAudioOnce=()=>{BGM.unlock();refreshVoices?.();};
window.addEventListener('pointerdown',unlockAudioOnce,{once:true,passive:true});

const SFX=(()=>{
  let ctx=null,master=null;
  const ensure=async()=>{
    if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=0.22;master.connect(ctx.destination);}
    if(ctx.state==='suspended')await ctx.resume();return ctx;
  };
  const beep=async(freq=660,dur=0.12,type='sine',gain=0.22,delay=0)=>{
    try{
      await ensure();const t=ctx.currentTime+delay;
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=type;o.frequency.setValueAtTime(freq,t);
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(gain,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+0.03);
    }catch(e){}
  };
  return{
    unlock:ensure,
    correct(){beep(740,0.10,'triangle',0.22,0);beep(988,0.13,'triangle',0.18,0.08);},
    wrong(){beep(220,0.18,'sawtooth',0.16,0);beep(160,0.22,'sawtooth',0.12,0.12);},
    combo(){beep(660,0.08,'square',0.13,0);beep(880,0.08,'square',0.13,0.06);beep(1180,0.12,'square',0.12,0.12);},
    level(){beep(523,0.10,'triangle',0.18,0);beep(659,0.10,'triangle',0.18,0.09);beep(784,0.12,'triangle',0.18,0.18);beep(1047,0.20,'triangle',0.18,0.29);},
    fanfare(){beep(523,0.12,'triangle',0.16,0);beep(659,0.12,'triangle',0.16,0.12);beep(784,0.12,'triangle',0.16,0.24);beep(1047,0.28,'triangle',0.18,0.38);},
  };
})();

};
const getQTimer=(mId,lv)=>{
  const base=MODES[mId]?.qt||Q_NORMAL;
  if(lv<=5)return base;
  return Math.max(base-(lv-5)*0.5,4);
};

  const idx=Math.min(lv-6,(INF_LABELS[l||'ko']||INF_LABELS.en).length-1);

};

const UA=navigator.userAgent;
const _isIOS=/iPhone|iPad|iPod/i.test(UA);
const _isAndroid=/Android/i.test(UA);
const _isEdge=/Edg\//i.test(UA);
const _isChrome=/Chrome|CriOS/i.test(UA)&&!_isEdge;
let _voices=[];
const refreshVoices=()=>{
  if(!window.speechSynthesis)return [];
  const vs=window.speechSynthesis.getVoices();
  if(vs&&vs.length)_voices=vs;
  return _voices;
};
const waitVoices=()=>new Promise(resolve=>{
  const v=refreshVoices();if(v.length){resolve(v);return;}
  let done=false;
  const finish=()=>{if(done)return;done=true;window.speechSynthesis?.removeEventListener('voiceschanged',finish);resolve(refreshVoices());};
  window.speechSynthesis?.addEventListener('voiceschanged',finish);
  setTimeout(finish,700);
});
const RATE_TABLE={
  ko:{edge:1.05,chrome:0.95,ios:0.82,android:0.90,default:0.95},
  en:{edge:1.05,chrome:0.98,ios:0.88,android:0.92,default:0.98},
  zh:{edge:0.98,chrome:0.90,ios:0.78,android:0.86,default:0.90},
  es:{edge:1.00,chrome:0.94,ios:0.84,android:0.90,default:0.94},
};
const getRate=lang=>{
  const row=RATE_TABLE[lang]||RATE_TABLE.ko;
  if(_isIOS)return row.ios;if(_isAndroid)return row.android;
  if(_isEdge)return row.edge;if(_isChrome)return row.chrome;
  return row.default;
};
const isCanto=v=>/HK/i.test(v.lang)||/sin\.ji|cantonese|yue/i.test(v.name);
const getVoice=(lc)=>{
  const vs=_voices.length?_voices:refreshVoices();if(!vs.length)return null;
  const lg=lc.split('-')[0];
  if(lc==='zh-CN'){
    return vs.find(v=>v.lang==='zh-CN'&&!isCanto(v)&&/Microsoft|Google|Tingting|Meijia|Sinji/i.test(v.name))||
           vs.find(v=>v.lang==='zh-CN'&&!isCanto(v))||vs.find(v=>v.lang.startsWith('zh')&&!isCanto(v))||null;
  }
  return vs.find(v=>v.lang===lc&&/Microsoft/i.test(v.name))||vs.find(v=>v.lang===lc&&/Google/i.test(v.name))||
         vs.find(v=>v.lang===lc&&/Yuna|Siri|Apple/i.test(v.name))||vs.find(v=>v.lang===lc)||vs.find(v=>v.lang.startsWith(lg))||null;
};
let _speakingToken=0;
const speakWeb=(txt,lang)=>new Promise(async resolve=>{
  if(!window.speechSynthesis){resolve();return;}
  const token=++_speakingToken;
  const c=LC[lang]||LC.ko;
  window.speechSynthesis.cancel();
  await waitVoices();
  setTimeout(()=>{
    if(token!==_speakingToken){resolve();return;}
    const u=new SpeechSynthesisUtterance(txt);
    u.lang=c.vl;u.voice=getVoice(c.vl);u.rate=getRate(lang);u.pitch=_isIOS?1.0:1.05;u.volume=1;
    let ended=false;const done=()=>{if(ended)return;ended=true;resolve();};
    u.onend=done;u.onerror=done;

const Q_STARTERS={
  ko:['자,','다음은,','이번엔,','그럼,','자 이제,'],
  en:['Quick!','Ready?','Here we go!','Solve it!','Listen up!'],
  zh:['小朋友！','来答题！','想一想！','快点！','加油！'],
  es:['¡Vamos!','¡Rápido!','¡Escucha!','¡Adelante!','¡A pensar!'],
};
const qSentence=(a,op,b,l)=>{
  const w=OPW[l][op];
  const s=Q_STARTERS[l][Math.floor(Math.random()*Q_STARTERS[l].length)];
  if(l==='ko')return`${s} ${a} ${w} ${b}. 얼마일까요?`;
  if(l==='en')return`${s} What is ${a} ${w} ${b}?`;
  if(l==='zh')return`${s} ${a} ${w} ${b} 等于多少呢？`;
  return`${s} ¿Cuánto es ${a} ${w} ${b}?`;
};

const genQ=lv=>{
  const c=getLvCfg(lv);
  const op=c.ops[Math.floor(Math.random()*c.ops.length)];
  let a,b,ans;
  if(op==='+'){a=Math.floor(Math.random()*c.max)+1;b=Math.floor(Math.random()*c.max)+1;ans=a+b;}
  else if(op==='-'){a=Math.floor(Math.random()*c.max)+2;b=Math.floor(Math.random()*(a-1))+1;ans=a-b;}
  else if(op==='×'){const m=c.timesMax||9;a=Math.floor(Math.random()*m)+2;b=Math.floor(Math.random()*m)+2;ans=a*b;}
  else{b=Math.floor(Math.random()*8)+2;ans=Math.floor(Math.random()*8)+2;a=b*ans;}
  const s=new Set([ans]);let t=0;
  while(s.size<4&&t<100){t++;const w=ans+(Math.floor(Math.random()*14)-7);if(w!==ans&&w>=0&&!s.has(w))s.add(w);}
  while(s.size<4)s.add(ans+s.size*6+4);
  return{a,op,b,answer:ans,choices:[...s].sort(()=>Math.random()-0.5)};
};

                style={{flex:1,background:sel?'white':'rgba(255,255,255,0.22)',border:`2.5px solid ${sel?'#FFD600':'rgba(255,255,255,0.45)'}`,borderRadius:14,padding:'8px 3px',display:'flex',flexDirection:'column',alignItems:'center',gap:2,transition:'all 0.2s',boxShadow:sel?'0 0 0 3px rgba(255,214,0,0.45),0 4px 12px rgba(0,0,0,0.12)':'none',transform:sel?'scale(1.07)':'scale(1)'}}>
                <span style={{fontSize:20}}>{v.flag}</span>
                <span style={{fontSize:10,fontWeight:900,color:sel?'#92400E':'white',lineHeight:1.1,textAlign:'center'}}>{v.name}</span>
                <span style={{fontSize:9,fontWeight:700,color:sel?'#B45309':'rgba(255,255,255,0.75)',lineHeight:1}}>{v.sub}</span>
              </button>);
            })}
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,width:'100%',marginBottom:12}}>
          {Object.values(MODES).map(m=>(
            <button key={m.id} onClick={()=>{BGM.unlock();startGame(m.id);}}
              style={{background:'rgba(255,255,255,0.22)',border:'2px solid rgba(255,255,255,0.45)',borderRadius:18,padding:'11px 10px 10px',color:'white',display:'flex',flexDirection:'column',alignItems:'flex-start',gap:3,textAlign:'left',position:'relative',overflow:'hidden',backdropFilter:'blur(8px)',boxShadow:'0 2px 12px rgba(0,0,0,0.08)'}}>
              <span style={{position:'absolute',top:7,right:7,background:m.bc,borderRadius:7,padding:'2px 7px',fontSize:9,fontWeight:900,color:'white',lineHeight:1.4}}>{m.badge}</span>
              <span style={{fontSize:28,filter:'drop-shadow(0 2px 4px rgba(0,0,0,0.18))'}}>{m.icon}</span>
              <div style={{fontSize:15,fontWeight:900,fontFamily:"'Fredoka One','Nunito',sans-serif",lineHeight:1.1}}>{m.title[lang]||m.title.ko}</div>
              <div style={{fontSize:10.5,opacity:0.9,lineHeight:1.35,fontWeight:700}}>{m.desc[lang]||m.desc.ko}</div>
            </button>
          ))}
        </div>
        <p style={{color:'rgba(255,255,255,0.7)',fontSize:10.5,textAlign:'center',fontWeight:700}}>🔊 음성 지원 · 4가지 언어 · 6단계 레벨</p>
      </div>
    </div>
  );

  if(scr==='result'){
    const mi2=mi||MODES.normal;
    const praise=score>=900?{ko:'완전 천재! 대박이에요! 🏆',en:'Pure genius! Amazing! 🏆',zh:'真天才！太厉害了！🏆',es:'¡Genio total! ¡Increíble! 🏆'}:score>=400?{ko:'정말 잘했어요! 멋져요! ⭐',en:'Great job! You rock! ⭐',zh:'非常好！真棒！⭐',es:'¡Muy bien! ¡Excelente! ⭐'}:{ko:'잘했어요! 다시 도전해봐요! 💪',en:'Good try! Play again! 💪',zh:'加油！再来一次！💪',es:'¡Buen intento! ¡Otra vez! 💪'};
    const medal=score>=900?'🥇':score>=400?'🥈':score>=100?'🥉':'🎖️';
    return(
      <div style={{minHeight:'100vh',background:'linear-gradient(145deg,#FF7043,#FFB300,#43A047)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px 14px',fontFamily:"'Nunito',sans-serif"}}>
        <div style={{fontSize:82,animation:'resultGlow 1.4s ease-in-out infinite',marginBottom:2}}>{getPet(lvR.current+1).emoji}</div>
        <div style={{fontSize:28,marginBottom:4}}>{medal} {getGrade(score,acc)} 등급</div>
        <h1 style={{fontSize:26,fontWeight:900,color:'white',margin:'4px 0 6px',textShadow:'0 3px 12px rgba(0,0,0,0.22)',textAlign:'center',fontFamily:"'Fredoka One','Nunito',sans-serif"}}>{T.gameEnd[lang]}</h1>
        <p style={{fontSize:14,color:'rgba(255,255,255,0.96)',margin:'0 0 10px',fontWeight:800,textAlign:'center'}}>{praise[lang]||praise.ko}</p>
        <div style={{background:'rgba(255,255,255,0.22)',borderRadius:12,padding:'5px 16px',marginBottom:12,fontSize:13,color:'white',fontWeight:900}}>{LC[lang].flag} {LC[lang].name} · {mi2.icon} {mi2.title[lang]||mi2.title.ko}</div>
        <div style={{width:'100%',maxWidth:400,marginBottom:12}}>
          <PetCard pet={getPet(lvR.current+1)} lang={lang} score={score} combo={mcR.current} pulse={true}/>
        </div>
        <div style={{background:'rgba(255,255,255,0.18)',borderRadius:20,padding:14,width:'100%',maxWidth:400,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
          {[
            [lang==='ko'?'🎯 점수':lang==='en'?'🎯 Score':lang==='zh'?'🎯 得分':'🎯 Pts',`${score}${lang==='ko'?'점':''}`],
            [lang==='ko'?'✅ 정답':lang==='en'?'✅ Correct':lang==='zh'?'✅ 正确':'✅ Acierto',`${crR.current}${lang==='ko'?'개':''}`],
            [lang==='ko'?'📊 정확도':lang==='en'?'📊 Accuracy':lang==='zh'?'📊 准确率':'📊 Precisión',`${acc}%`],
            [lang==='ko'?'📈 레벨':lang==='en'?'📈 Level':lang==='zh'?'📈 等级':'📈 Nivel',`Lv.${lvR.current+1}`],
            [lang==='ko'?'🔥 콤보':lang==='en'?'🔥 Combo':lang==='zh'?'🔥 连击':'🔥 Combo',`${mcR.current}${lang==='ko'?'연속':lang==='zh'?'连':'x'}`],
            [lang==='ko'?'📝 총':lang==='en'?'📝 Total':lang==='zh'?'📝 总计':'📝 Total',`${ttR.current}${lang==='ko'?'개':''}`],
          ].map(([lb,v])=>(
            <div key={lb} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'rgba(255,255,255,0.2)',borderRadius:13,padding:'10px 6px',animation:'popIn 0.4s ease-out'}}>
              <span style={{color:'rgba(255,255,255,0.82)',fontSize:11,textAlign:'center',fontWeight:700}}>{lb}</span>
              <span style={{color:'white',fontSize:20,fontWeight:900,fontFamily:"'Fredoka One','Nunito',sans-serif"}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,width:'100%',maxWidth:400}}>
          <button onClick={()=>{
            const lvName=lvLabel(lvR.current,lang);
            const shareText={
              ko:`🧮 수학 천재 게임\n\n👑 Lv.${lvR.current+1} ${lvName} 달성!\n${getPet(lvR.current+1).emoji} ${getPet(lvR.current+1).name.ko} 성장\n🎯 점수 ${score}점\n📊 정확도 ${acc}%\n🔥 최고 콤보 ${mcR.current}연속\n\n나도 도전해봐! 🚀`,
              en:`🧮 Math Genius Game\n\n👑 Reached Lv.${lvR.current+1} ${lvName}!\n🎯 Score: ${score}\n📊 Accuracy: ${acc}%\n🔥 Best Combo: ${mcR.current}x\n\nCan you beat me? 🚀`,
              zh:`🧮 数学天才游戏\n\n👑 达到Lv.${lvR.current+1} ${lvName}！\n🎯 得分：${score}分\n📊 正确率：${acc}%\n🔥 最高连击：${mcR.current}次\n\n来挑战我吧！🚀`,
              es:`🧮 Juego Genio Matemático\n\n👑 ¡Alcancé Lv.${lvR.current+1} ${lvName}!\n🎯 Puntos: ${score}\n📊 Precisión: ${acc}%\n🔥 Combo máx: ${mcR.current}x\n\n¡Atrévete! 🚀`,
            }[lang]||'';
            if(navigator.share){navigator.share({title:'수학 천재 게임',text:shareText}).catch(()=>{});}
            else{navigator.clipboard.writeText(shareText).then(()=>{alert(lang==='ko'?'📋 복사됐어요! 카카오톡·SNS에 붙여넣기 하세요 😊':lang==='en'?'📋 Copied! Paste it anywhere 😊':lang==='zh'?'📋 已复制！粘贴到任意地方 😊':'📋 ¡Copiado!');}).catch(()=>{const el=document.createElement('textarea');el.value=shareText;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);alert('📋 복사됐어요!');});}
          }} style={{background:'linear-gradient(135deg,#F59E0B,#EF4444)',border:'none',borderRadius:15,padding:14,fontSize:16,fontWeight:900,color:'white',boxShadow:'0 4px 18px rgba(245,158,11,0.45)'}}>
            {lang==='ko'?'🔗 결과 공유하기':lang==='en'?'🔗 Share Result':lang==='zh'?'🔗 分享成绩':'🔗 Compartir'}
          </button>
          <button onClick={()=>startGame(mode)} style={{background:'linear-gradient(135deg,#0EA5E9,#0284C7)',border:'none',borderRadius:15,padding:14,fontSize:16,fontWeight:900,color:'white',boxShadow:'0 4px 18px rgba(14,165,233,0.4)'}}>{T.retry[lang]}</button>
          <button onClick={goHome} style={{background:'linear-gradient(135deg,#22C55E,#16A34A)',border:'none',borderRadius:15,padding:14,fontSize:16,fontWeight:900,color:'white',boxShadow:'0 4px 18px rgba(34,197,94,0.4)'}}>{T.goHome[lang]}</button>
        </div>
      </div>
    );
  }

  if(!q)return null;
  const mCfg=MODES[mode];
  const numC=['#0369A1','#0F766E','#15803D','#C2410C','#7C3AED','#B91C1C'][Math.min(lv,5)];
  const isInfLv=lv>5;

  return(
    <div style={{minHeight:'100vh',background:BG[bgKey],transition:'background 0.4s',display:'flex',flexDirection:'column',alignItems:'center',padding:'9px 12px 20px',fontFamily:"'Nunito',sans-serif",position:'relative',overflow:'hidden'}}>
      {stars.map(s=>(<div key={s.id} style={{position:'fixed',left:`${s.x}%`,top:'30%',fontSize:s.sz,animation:'starPop 1.1s ease-out forwards',pointerEvents:'none',zIndex:99}}>{s.ch}</div>))}
      {sAnim&&(<div style={{position:'fixed',top:'20%',left:'50%',transform:'translateX(-50%)',fontSize:34,fontWeight:900,color:'#FFD600',animation:'scoreFloat 0.95s ease-out forwards',pointerEvents:'none',zIndex:100,textShadow:'0 2px 10px rgba(0,0,0,0.4)',whiteSpace:'nowrap',fontFamily:"'Fredoka One','Nunito',sans-serif"}}>{sAnim}</div>)}
      <div style={{width:'100%',maxWidth:490,display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
        <button onClick={goHome} style={{background:'rgba(255,255,255,0.24)',border:'none',borderRadius:16,padding:'6px 13px',color:'white',fontSize:12,fontWeight:900}}>🏠 {T.home[lang]}</button>
        <div style={{background:'rgba(255,255,255,0.24)',borderRadius:16,padding:'6px 13px',fontSize:13,color:'white',fontWeight:900}}>{mCfg?.icon} {mCfg?.title[lang]||mCfg?.title.ko}</div>
        <div style={{background:'rgba(255,255,255,0.24)',borderRadius:16,padding:'6px 13px',fontSize:13,color:'white',fontWeight:900}}>{LC[lang].flag}</div>
      </div>
      <div style={{width:'100%',maxWidth:490,display:'grid',gridTemplateColumns:'1fr 1fr 1.2fr',gap:6,marginBottom:6}}>
        <div style={{background:'rgba(255,255,255,0.22)',borderRadius:13,padding:'7px 8px',textAlign:'center'}}>
          <div style={{color:'rgba(255,255,255,0.8)',fontSize:10,fontWeight:700}}>{T.score[lang]}</div>
          <div style={{color:'white',fontSize:18,fontWeight:900,fontFamily:"'Fredoka One','Nunito',sans-serif"}}>{score}</div>
        </div>
        <div style={{background:'rgba(255,255,255,0.22)',borderRadius:13,padding:'7px 8px',textAlign:'center'}}>
          <div style={{color:'rgba(255,255,255,0.8)',fontSize:10,fontWeight:700}}>{T.level[lang]}</div>
          <div style={{color:isInfLv?'#FFD600':'white',fontSize:14,fontWeight:900}}>
            {isInfLv?'👑 ':''}Lv.{lv+1}
            <span style={{fontSize:10,opacity:0.85,marginLeft:3}}>{lvLabel(lv,lang)}</span>
            {isInfLv&&<span style={{fontSize:9,display:'block',color:'#FFD600',opacity:0.9}}>⏰{getQTimer(mode,lv)}s</span>}
          </div>
        </div>
        {mode==='time'?(
          <div style={{background:'rgba(255,255,255,0.22)',borderRadius:13,padding:'7px 8px',textAlign:'center'}}>
            <div style={{color:'rgba(255,255,255,0.8)',fontSize:10,fontWeight:700}}>{T.timeL[lang]}</div>
            <div style={{color:timeLft<=10?'#FFD600':'white',fontSize:18,fontWeight:900,animation:timeLft<=10?'timerWarn 0.5s infinite':'none'}}>{T.secT(timeLft,lang)}</div>
          </div>
        ):(
          <div style={{background:'rgba(255,255,255,0.22)',borderRadius:13,padding:'6px 5px',textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
            <div style={{color:'rgba(255,255,255,0.8)',fontSize:10,fontWeight:700}}>{T.lives[lang]}</div>
            <Hearts lives={lives} max={mCfg?.lives||5}/>
          </div>
        )}
      </div>
      {combo>=3&&(<div style={{background:'rgba(255,214,0,0.22)',border:'2px solid #FFD600',borderRadius:16,padding:'3px 14px',marginBottom:5,fontSize:14,fontWeight:900,color:'#FFD600',animation:'pulse 0.65s infinite'}}>{T.comboT(combo,lang)} {combo>=10?'👑':combo>=5?'⚡':''}</div>)}
      <div style={{width:'100%',maxWidth:490,marginBottom:7}}>
        <PetCard pet={currentPet} lang={lang} compact={true} pulse={petPulse} combo={combo} score={score}/>
      </div>
      <div style={{width:'100%',maxWidth:490,marginBottom:6}}>
        <TimerBar val={qTime} max={qMax} lang={lang}/>
      </div>
      <div style={{width:'100%',maxWidth:490,marginBottom:8}}>
        <div style={{background:'rgba(255,255,255,0.18)',borderRadius:20,height:7}}>
          <div style={{background:'#FFD600',borderRadius:20,height:'100%',width:`${(corr%5)/5*100}%`,transition:'width 0.5s'}}/>
        </div>
        <div style={{color:'rgba(255,255,255,0.68)',fontSize:10,textAlign:'right',marginTop:2,fontWeight:700}}>{T.toLvUp(5-(corr%5),lang)}</div>
      </div>
      {lvAnim&&(<div style={{background:'white',color:'#B45309',fontSize:15,fontWeight:900,padding:'8px 22px',borderRadius:26,marginBottom:8,boxShadow:'0 4px 20px rgba(0,0,0,0.2)',animation:'levelUp 0.5s ease-out',fontFamily:"'Fredoka One','Nunito',sans-serif",textAlign:'center'}}>{T.lvUpMsg(lv+1,lvLabel(lv,lang),lang)}</div>)}
      <div style={{background:'rgba(255,255,255,0.18)',borderRadius:24,padding:'16px 16px',marginBottom:8,width:'100%',maxWidth:490,textAlign:'center',animation:shake?'shake 0.44s ease-out':'none',border:'2px solid rgba(255,255,255,0.28)',backdropFilter:'blur(8px)'}}>
        {mode==='listen'?(
          <div style={{padding:'4px 0'}}>
            <div style={{fontSize:60,animation:lstPh?'listenBeat 0.85s ease-in-out infinite':'none'}}>👂</div>
            <p style={{color:'white',fontSize:14,fontWeight:900,marginTop:8}}>{lstPh?T.listen[lang]:T.readV[lang]}</p>
            <button onClick={()=>{BGM.unlock();say(qSentence(q.a,q.op,q.b,lang),lang);}} style={{background:'rgba(255,255,255,0.24)',border:'2px solid rgba(255,255,255,0.5)',borderRadius:16,padding:'6px 16px',color:'white',fontSize:12,fontWeight:900,marginTop:8}}>🔊 {T.replay[lang]}</button>
          </div>
        ):(
          <>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.82)',marginBottom:8,fontWeight:700}}>🔊 {LC[lang].flag} {T.readV[lang]}</div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:7,marginBottom:10,flexWrap:'wrap'}}>
              <NumBox val={String(q.a)} color={numC}/>
              <OpBox op={q.op}/>
              <NumBox val={String(q.b)} color={numC}/>
              <span style={{fontSize:30,color:'rgba(255,255,255,0.88)',fontWeight:900,fontFamily:"'Fredoka One','Nunito',sans-serif"}}>=</span>
              <div style={{width:58,height:60,background:'rgba(255,255,255,0.2)',borderRadius:16,border:'3px dashed rgba(255,255,255,0.6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,color:'rgba(255,255,255,0.8)'}}>?</div>
            </div>
            <button onClick={()=>{BGM.unlock();say(qSentence(q.a,q.op,q.b,lang),lang);}} style={{background:'rgba(255,255,255,0.22)',border:'2px solid rgba(255,255,255,0.4)',borderRadius:16,padding:'5px 16px',color:'white',fontSize:11,fontWeight:800}}>🔊 {T.replay[lang]}</button>
          </>
        )}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,width:'100%',maxWidth:490}}>
        {q.choices.map((c,i)=>{
          let bg='rgba(255,255,255,0.94)',bd='3px solid rgba(255,255,255,0.7)',cl='#1e1b4b',sh='0 4px 14px rgba(0,0,0,0.13)';
          if(selA!==null){
            if(c===q.answer){bg='#16A34A';bd='3px solid #15803D';cl='white';sh='0 4px 18px rgba(22,163,74,0.5)';}
            else if(c===selA){bg='#DC2626';bd='3px solid #B91C1C';cl='white';}
            else{bg='rgba(255,255,255,0.36)';cl='rgba(255,255,255,0.45)';}
          }
          const isDisabled=lockd||(mode==='listen'&&lstPh);
          const l2=String(c).length;
          return(<button key={i} onClick={()=>handleA(c)} disabled={isDisabled}
            style={{background:bg,border:bd,borderRadius:18,padding:'15px 6px',fontSize:l2>3?18:l2>2?24:30,fontWeight:900,color:cl,boxShadow:sh,transition:'all 0.2s',fontFamily:"'Fredoka One','Nunito',sans-serif",minHeight:64,opacity:isDisabled&&selA===null?0.45:1}}>
            {c}
          </button>);
        })}
      </div>
      {fbTy&&(<div style={{marginTop:11,fontSize:18,fontWeight:900,color:'white',textShadow:'0 2px 10px rgba(0,0,0,0.28)',textAlign:'center',animation:'fadeInUp 0.3s ease-out'}}>
        {fbTx}
        {fbTy==='w'&&selA!=='to'&&q&&(<div style={{fontSize:13,marginTop:3,opacity:0.92}}>{T.wrongA(q.answer,lang)}</div>)}
      </div>)}
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
